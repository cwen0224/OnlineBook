<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>線上電子繪本 | 互動繪本閱讀平台</title>
    <link rel="stylesheet" href="style.css?v=202604011534">
    <style>
        body {
            background: url('bg_optimized.webp') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        #entrance-overlay {
            background: rgba(0, 0, 0, 0.4); /* 加上半透明遮罩讓文字更清晰 */
            backdrop-filter: blur(2px);
            animation: fadeIn 0.8s ease-out;
        }
        .book-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            color: white;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            cursor: pointer;
            width: 260px;
            text-decoration: none;
            display: block;
        }
        .book-card:hover {
            transform: translateY(-15px) scale(1.03);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .cover-img {
            width: 100%;
            aspect-ratio: 1.414; /* A4 ratio roughly */
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.5s;
        }
        .book-card:hover .cover-img {
            transform: rotate(-2deg);
        }
        /* 預設隱藏開發測試區內容 */
        #tuning-panel, #book, #phonetic-toggle-btn, #version-banner {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Entrance Overlay -->
    <div id="entrance-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        
        <!-- Language Switcher (使用行內樣式確保絕對生效) -->
        <div style="position: absolute; top: 2rem; right: 2rem; display: flex; gap: 12px; z-index: 10001;">
            <button id="btn-zh" onclick="setLang('zh-TW')" style="background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 10px 24px; border-radius: 30px; cursor: pointer; transition: all 0.3s; font-size: 0.9rem; letter-spacing: 1px; font-weight: bold; backdrop-filter: blur(10px);">繁體中文</button>
            <button id="btn-en" onclick="setLang('en')" style="background: transparent; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.6); padding: 10px 24px; border-radius: 30px; cursor: pointer; transition: all 0.3s; font-size: 0.9rem; letter-spacing: 1px; backdrop-filter: blur(10px);">English</button>
        </div>

        <h1 id="main-title" style="color: white; font-size: 3.8rem; margin-bottom: 4rem; text-shadow: 0 10px 30px rgba(0,0,0,0.8); letter-spacing: 6px; font-weight: 800; text-align: center;">線上電子繪本</h1>
        
        <div style="display: flex; gap: 4rem; flex-wrap: wrap; justify-content: center; padding: 0 20px;">
            <a href="viewer.html?book=zaojiao&lang=zh-TW" class="book-card book-link" data-book="zaojiao">
                <img src="pages_zaojiao_tw/page_001.webp" class="cover-img" alt="Cover">
                <h2 class="b-title" style="font-size: 1.6rem; margin: 0; font-weight: 600; letter-spacing: 1px;">藻礁保衛戰</h2>
                <p class="b-cat" style="margin-top: 12px; font-size: 0.9rem; opacity: 0.7; font-weight: 400; letter-spacing: 2px;">社會系列</p>
            </a>
            
            <a href="viewer.html?book=shigo&lang=zh-TW" class="book-card book-link" data-book="shigo">
                <img src="pages_shigo_tw/page_001.webp" class="cover-img" alt="Cover">
                <h2 class="b-title" style="font-size: 1.6rem; margin: 0; font-weight: 600; letter-spacing: 1px;">海客石滬</h2>
                <p class="b-cat" style="margin-top: 12px; font-size: 0.9rem; opacity: 0.7; font-weight: 400; letter-spacing: 2px;">親子系列</p>
            </a>
        </div>
    </div>
    </div>

    <script>
        let currentLang = 'zh-TW';
        const i18n = {
            'zh-TW': {
                title: '線上電子繪本',
                dev: '進入 3D 互動繪本測試 (開發區)',
                books: {
                    zaojiao: { title: '藻礁保衛戰', cat: '社會系列' },
                    shigo: { title: '海客石滬', cat: '親子系列' }
                }
            },
            'en': {
                title: 'Online E-Books',
                dev: 'Enter 3D Interactive Test Area (Dev)',
                books: {
                    zaojiao: { title: 'Algal Reef Defense', cat: 'Social Series' },
                    shigo: { title: 'Shigo Stone Weir', cat: 'Parenting Series' }
                }
            }
        };

        function setLang(lang) {
            currentLang = lang;
            const t = i18n[lang];
            
            // Update UI
            document.getElementById('main-title').textContent = t.title;
            
            // Update Books
            document.querySelectorAll('.book-link').forEach(link => {
                const key = link.dataset.book;
                link.href = `viewer.html?book=${key}&lang=${lang}`;
                link.querySelector('.b-title').textContent = t.books[key].title;
                link.querySelector('.b-cat').textContent = t.books[key].cat;
            });

            // Update Buttons (Inline Style Version)
            const bZh = document.getElementById('btn-zh');
            const bEn = document.getElementById('btn-en');
            
            if (lang === 'zh-TW') {
                bZh.style.background = 'rgba(255,255,255,0.2)';
                bZh.style.borderColor = 'white';
                bZh.style.color = 'white';
                bZh.style.fontWeight = 'bold';
                
                bEn.style.background = 'transparent';
                bEn.style.borderColor = 'rgba(255,255,255,0.3)';
                bEn.style.color = 'rgba(255,255,255,0.6)';
                bEn.style.fontWeight = 'normal';
            } else {
                bEn.style.background = 'rgba(255,255,255,0.2)';
                bEn.style.borderColor = 'white';
                bEn.style.color = 'white';
                bEn.style.fontWeight = 'bold';
                
                bZh.style.background = 'transparent';
                bZh.style.borderColor = 'rgba(255,255,255,0.3)';
                bZh.style.color = 'rgba(255,255,255,0.6)';
                bZh.style.fontWeight = 'normal';
            }
        }

        function enterDevMode() {
            document.getElementById('entrance-overlay').style.display = 'none';
            // 顯示所有被隱藏的開發工具
            document.querySelectorAll('#tuning-panel, #book, #phonetic-toggle-btn, #version-banner').forEach(el => {
                el.style.setProperty('display', 'block', 'important');
            });
            document.body.style.overflow = 'auto';
        }
    </script>

    <!-- Tuning Panel -->
    <div id="tuning-panel" style="position: fixed; top: 70px; right: 20px; background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 15px; z-index: 5000; font-family: sans-serif; font-size: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); width: 250px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-height: 85vh; overflow-y: auto;">
        <div style="margin-bottom: 12px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; color: #ffcc00; display: flex; justify-content: space-between; align-items: center;">
            <span>🎨 繪本排版大師 (V.202604011534)</span>
            <span style="font-size: 10px; opacity: 0.6;">STRUCTURAL RECTIFICATION MASTER</span>
        </div>

        <!-- Punctuation Engine Section -->
        <div style="margin-bottom:15px; background: rgba(255,165,0,0.1); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,165,0,0.2);">
            <div style="font-weight:bold; margin-bottom:8px; color: #ffa500;">✨ 標點引擎 (Punctuation)</div>
            <select id="punc-engine" style="width: 100%; background: #333; color: white; border: 1px solid #555; border-radius: 5px; padding: 5px; font-size: 11px;">
                <option value="normal">模式 A：一般模式 (原始排版)</option>
                <option value="sticky">模式 B：粘滯模式 (防行首)</option>
                <option value="justified">模式 C：智慧對齊 (兩端對齊)</option>
                <option value="adobe">模式 D：Adobe 智慧滿行 (Legacy)</option>
                <option value="ai" selected>模式 E：JSON 微調 (AI Layout)</option>
            </select>
            <div style="margin-top: 8px; font-size: 10px; opacity: 0.7; line-height: 1.4;">* 模式 E 由 JSON 提供字距權重，可讓 AI 微調每個 gap。</div>
        </div>
        
        <!-- Typography Section -->
        <div style="margin-bottom:15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px;">
            <div style="font-weight:bold; margin-bottom:8px; opacity:0.8;">【文字排版】</div>
            <label style="display:block; margin-bottom:5px;">大小 (Size): <span id="size-val">2.2</span>rem</label>
            <input type="range" id="size-slider" min="1.5" max="5" step="0.1" value="2.2" style="width:100%;">

            <label style="display:block; margin-top:10px; margin-bottom:5px;">行距 (Line Gap): <span id="line-val">10</span>px</label>
            <input type="range" id="line-slider" min="0" max="100" step="1" value="10" style="width:100%;">
            <div style="margin-top: 10px; font-size: 10px; opacity: 0.7; line-height: 1.4;">* 字距改由 JSON / AI 輸出，不再用滑桿調整。</div>
        </div>

        <!-- Box Section -->
        <div style="background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px;">
            <div style="font-weight:bold; margin-bottom:8px; opacity:0.8;">【容器背景】</div>
            <label style="display:block; margin-bottom:5px;">寬度 (Width): <span id="width-val">65</span>%</label>
            <input type="range" id="width-slider" min="30" max="95" step="1" value="65" style="width:100%;">
            
            <label style="display:block; margin-top:10px; margin-bottom:5px;">透明度 (Opacity): <span id="opacity-val">0.92</span></label>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.92" style="width:100%;">
            
            <label style="display:block; margin-top:10px; margin-bottom:5px;">羽化 (Blur): <span id="blur-val">12</span>px</label>
            <input type="range" id="blur-slider" min="0" max="40" step="1" value="12" style="width:100%;">
            
            <label style="display:block; margin-top:10px; margin-bottom:5px;">圓角 (Radius): <span id="radius-val">12</span>px</label>
            <input type="range" id="radius-slider" min="0" max="100" step="1" value="12" style="width:100%;">
        </div>
        
        <div style="margin-top:12px; font-size: 11px; opacity: 0.7;">* 調好後請截圖回覆數值</div>
    </div>

    <div id="book" class="book">
        <!-- Leaves dynamically injected here -->
    </div>

    <!-- UI Phonetic System Toggle -->
    <button id="phonetic-toggle-btn">切換拼音</button>

    <!-- Version banner that drops down on load -->
    <!-- Version banner with more visible styling: Bright Amber background -->
    <div id="version-banner" style="position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: #ffcc00; padding: 5px 20px; border-radius: 0 0 10px 10px; color: #000; font-family: monospace; font-weight: bold; font-size: 1rem; z-index: 3000; backdrop-filter: blur(5px); transition: top 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid #fff; border-top: none;">V.202604011534</div>

    <script src="script.js?v=202604011534"></script>
</body>
</html>
