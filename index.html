<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>True 3D Page Flip Book</title>
    <link rel="stylesheet" href="style.css?v=202603312040">
</head>
<body>

    <!-- Tuning Panel -->
    <div id="tuning-panel" style="position: fixed; top: 70px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 15px; z-index: 5000; font-family: sans-serif; font-size: 13px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); width: 220px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div style="margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;">🔧 文字排版調教 (V.2040)</div>
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px;">全局間距 (Char Gap): <span id="gap-val">1.5</span>em</label>
            <input type="range" id="gap-slider" min="0" max="3" step="0.1" value="1.5" style="width:100%;">
        </div>
        <div>
            <label style="display:block; margin-bottom:5px;">注音右距 (Tone Padding): <span id="tone-val">0.5</span>em</label>
            <input type="range" id="tone-slider" min="0" max="1" step="0.05" value="0.5" style="width:100%;">
        </div>
        <div style="margin-top:10px; font-size: 11px; opacity: 0.7;">* 調好後請截圖回覆數值</div>
    </div>

    <div id="book" class="book">
        <!-- Leaves dynamically injected here -->
    </div>

    <!-- UI Phonetic System Toggle -->
    <button id="phonetic-toggle-btn">切換拼音</button>

    <!-- Version banner that drops down on load -->
    <!-- Version banner with more visible styling: Bright Amber background -->
    <div id="version-banner" style="position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: #ffcc00; padding: 5px 20px; border-radius: 0 0 10px 10px; color: #000; font-family: monospace; font-weight: bold; font-size: 1rem; z-index: 3000; backdrop-filter: blur(5px); transition: top 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid #fff; border-top: none;">V.202603312040</div>

    <script src="script.js?v=202603312040"></script>
</body>
</html>
