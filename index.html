<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>True 3D Page Flip Book</title>
    <link rel="stylesheet" href="style.css?v=202603312455">
</head>
<body>

    <!-- Tuning Panel -->
    <div id="tuning-panel" style="position: fixed; top: 70px; right: 20px; background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 15px; z-index: 5000; font-family: sans-serif; font-size: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); width: 250px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-height: 85vh; overflow-y: auto;">
        <div style="margin-bottom: 12px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; color: #ffcc00; display: flex; justify-content: space-between; align-items: center;">
            <span>🎨 繪本排版大師 (V.2455)</span>
            <span style="font-size: 10px; opacity: 0.6;">STATE & WIDTH PURE MASTER</span>
        </div>

        <!-- Punctuation Engine Section -->
        <div style="margin-bottom:15px; background: rgba(255,165,0,0.1); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,165,0,0.2);">
            <div style="font-weight:bold; margin-bottom:8px; color: #ffa500;">✨ 標點引擎 (Punctuation)</div>
            <select id="punc-engine" style="width: 100%; background: #333; color: white; border: 1px solid #555; border-radius: 5px; padding: 5px; font-size: 11px;">
                <option value="normal">模式 A：一般模式 (原始排版)</option>
                <option value="sticky">模式 B：粘滯模式 (防行首)</option>
                <option value="justified">模式 C：智慧對齊 (兩端對齊)</option>
                <option value="adobe" selected>模式 D：Adobe 智慧滿行 (Full Justify)</option>
            </select>
            <div style="margin-top: 8px; font-size: 10px; opacity: 0.7; line-height: 1.4;">* 模式 D 完全模擬專業出版軟體，自動撐開字距填滿容器。</div>
        </div>
        
        <!-- Typography Section -->
        <div style="margin-bottom:15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px;">
            <div style="font-weight:bold; margin-bottom:8px; opacity:0.8;">【文字排版】</div>
            <label style="display:block; margin-bottom:5px;">大小 (Size): <span id="size-val">2.2</span>rem</label>
            <input type="range" id="size-slider" min="1.5" max="5" step="0.1" value="2.2" style="width:100%;">
            
            <label style="display:block; margin-top:10px; margin-bottom:5px;">字距 (Gap): <span id="gap-val">1.8</span>em</label>
            <input type="range" id="gap-slider" min="0" max="3" step="0.1" value="1.8" style="width:100%;">

            <label style="display:block; margin-top:10px; margin-bottom:5px;">行距 (Line Gap): <span id="line-val">10</span>px</label>
            <input type="range" id="line-slider" min="0" max="100" step="1" value="10" style="width:100%;">
        </div>

        <!-- Box Section -->
        <div style="background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px;">
            <div style="font-weight:bold; margin-bottom:8px; opacity:0.8;">【容器背景】</div>
            <label style="display:block; margin-bottom:5px;">寬度 (Width): <span id="width-val">65</span>%</label>
            <input type="range" id="width-slider" min="30" max="95" step="1" value="65" style="width:100%;">
            
            <label style="display:block; margin-top:10px; margin-bottom:5px;">透明度 (Opacity): <span id="opacity-val">0.92</span></label>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.92" style="width:100%;">
            
            <label style="display:block; margin-top:10px; margin-bottom:5px;">羽化 (Blur): <span id="blur-val">12</span>px</label>
            <input type="range" id="blur-slider" min="0" max="40" step="1" value="12" style="width:100%;">
            
            <label style="display:block; margin-top:10px; margin-bottom:5px;">圓角 (Radius): <span id="radius-val">12</span>px</label>
            <input type="range" id="radius-slider" min="0" max="100" step="1" value="12" style="width:100%;">
        </div>
        
        <div style="margin-top:12px; font-size: 11px; opacity: 0.7;">* 調好後請截圖回覆數值</div>
    </div>

    <div id="book" class="book">
        <!-- Leaves dynamically injected here -->
    </div>

    <!-- UI Phonetic System Toggle -->
    <button id="phonetic-toggle-btn">切換拼音</button>

    <!-- Version banner that drops down on load -->
    <!-- Version banner with more visible styling: Bright Amber background -->
    <div id="version-banner" style="position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: #ffcc00; padding: 5px 20px; border-radius: 0 0 10px 10px; color: #000; font-family: monospace; font-weight: bold; font-size: 1rem; z-index: 3000; backdrop-filter: blur(5px); transition: top 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid #fff; border-top: none;">V.202603312455</div>

    <script src="script.js?v=202603312455"></script>
</body>
</html>
